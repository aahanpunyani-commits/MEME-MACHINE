<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MEMEMACHINE</title>
  <style>
    body {
      margin: 0;
      font-family: "Inter", "Roboto", sans-serif;
      background: linear-gradient(to bottom, #fffde7, #fff3cd);
      color: #333;
      text-align: center;
      padding: 40px;
      transition: background 0.3s, color 0.3s;
    }

    header h1 {
      font-size: 48px;
      font-weight: 600;
      margin-bottom: 30px;
      color: #d4ac0d;
    }

    .controls {
      margin-bottom: 30px;
    }

    .controls input {
      width: 350px;
      height: 40px;
      font-size: 16px;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 8px;
      margin-right: 10px;
      background-color: #fff;
    }

    .controls button {
      padding: 10px 20px;
      margin: 5px;
      border: none;
      border-radius: 8px;
      background-color: #f9e79f;
      color: #333;
      font-size: 15px;
      cursor: pointer;
      transition: background-color 0.2s ease-in-out;
    }

    .controls button:hover {
      background-color: #f7dc6f;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      margin-top: 20px;
    }

    .meme-button {
      width: 220px;
      height: 60px;
      border: none;
      border-radius: 8px;
      background-color: #fff;
      color: #333;
      font-size: 18px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s ease-in-out, transform 0.1s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .meme-button:hover {
      background-color: #fff9c4;
      transform: scale(1.02);
    }

    footer {
      margin-top: 50px;
      padding: 20px;
      font-size: 14px;
      color: #555;
      border-top: 1px solid #ddd;
    }

    /* Dark mode */
    body.dark {
      background: #222;
      color: #eee;
    }
    body.dark header h1 {
      color: #f9e79f;
    }
    body.dark .controls button {
      background-color: #444;
      color: #eee;
    }
    body.dark .meme-button {
      background-color: #333;
      color: #eee;
    }
    /* Chaos flicker mode */
    /* Chaos flicker mode */
body.chaos {
  background: #000 !important;
  color: #fff !important;
}


  </style>
</head>
<body>
  <header>
    <h1>MEMEMACHINE</h1>
  </header>

  <main>
    <div class="controls">
      <input type="text" id="searchBar" placeholder="Search meme name..." aria-label="Search meme"><br>
      <button id="searchBtn">Play Meme</button>
      <button id="randomBtn">Random Meme</button>
      <button id="chaosBtn">Chaos Mode</button>
      <button id="darkModeBtn">Toggle Dark Mode</button>
      <button id="muteBtn">Mute/Unmute</button>
    </div>

    <div>
      <label for="volume">Volume:</label>
      <input type="range" id="volume" min="0" max="1" step="0.1" value="1">
      <label for="speed">Speed:</label>
      <input type="range" id="speed" min="0.5" max="2" step="0.1" value="1">
    </div>

    <div class="grid">
      <button class="meme-button" data-meme="faahh">Faahh (1)</button>
      <button class="meme-button" data-meme="galaxy meme">Galaxy Meme (2)</button>
      <button class="meme-button" data-meme="among us">Among Us (3)</button>
      <button class="meme-button" data-meme="emotional damage">Emotional Damage (4)</button>
      <button class="meme-button" data-meme="bruh">Bruh (5)</button>
      <button class="meme-button" data-meme="fbi">FBI Open Up (6)</button>
    </div>
  </main>

  <footer>
    <p>Made by <strong>Aahan Punyani</strong></p>
    <p>Supporters: Vihaan Bhura Anda, Manan Saluja, Ansh Baba</p>
  </footer>

  <script>
    const memeMap = {
      "faahh": new Audio("./sound_68c2abc71447f.mp3"),
      "galaxy meme": new Audio("./galaxy-meme.mp3"),
      "among us": new Audio("./among-us.mp3"),
      "emotional damage": new Audio("./emotional_damage.mp3"),
      "bruh": new Audio("./Bruh meme - QuickSounds.com.mp3"),
      "fbi": new Audio("./FBI OPEN UP (with explosion) - QuickSounds.com.mp3")
    };

    let muted = false;

    function playMeme(name) {
      const audio = memeMap[name];
      if (audio) {
        audio.volume = muted ? 0 : document.getElementById("volume").value;
        audio.playbackRate = document.getElementById("speed").value;
        audio.play();
      }
    }

    document.querySelectorAll(".meme-button").forEach(button => {
      button.addEventListener("click", () => {
        const meme = button.dataset.meme;
        playMeme(meme);
      });
    });

    document.getElementById("searchBtn").addEventListener("click", () => {
      const query = document.getElementById("searchBar").value.toLowerCase();
      if (memeMap[query]) {
        playMeme(query);
      } else {
        alert("Meme not found.");
      }
    });

    document.getElementById("randomBtn").addEventListener("click", () => {
      const keys = Object.keys(memeMap);
      const randomKey = keys[Math.floor(Math.random() * keys.length)];
      playMeme(randomKey);
    });

   document.getElementById("chaosBtn").addEventListener("click", () => {
  // Play all memes at once
  Object.values(memeMap).forEach(audio => {
    audio.volume = muted ? 0 : document.getElementById("volume").value;
    audio.playbackRate = document.getElementById("speed").value;
    audio.currentTime = 0;
    audio.play();
  });

  // Flicker effect using CHAOS class
  let count = 0;
  const interval = setInterval(() => {
    document.body.classList.toggle("chaos");
    count++;
    if (count > 40) { // flicker 40 times then stop
      clearInterval(interval);
      document.body.classList.remove("chaos"); // reset chaos flicker
    }
  }, 60); // toggle every 60ms (fast flicker)
});

    document.getElementById("muteBtn").addEventListener("click", () => {
      muted = !muted;
      alert(muted ? "Muted" : "Unmuted");
    });

    // Keyboard shortcuts
    document.addEventListener("keydown", (e) => {
      const shortcuts = {
        "1": "faahh",
        "2": "galaxy meme",
        "3": "among us",
        "4": "emotional damage",
        "5": "bruh",
        "6": "fbi"
      };
      if (shortcuts[e.key]) {
        playMeme(shortcuts[e.key]);
      }
    });
    document.getElementById("darkModeBtn").addEventListener("click", () => {
  document.body.classList.toggle("dark");
});
  </script>
</body>
</html>
